<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5a8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="46" fill="url(#bg)"/>
  <rect x="1" y="1" width="198" height="198" rx="45" fill="none" stroke="#1e2940" stroke-width="2"/>
  <!-- pulse waveform that reads as a V at its center beat -->
  <path d="M28 104 L60 104 L72 104 L86 150 L100 50 L114 116 L122 92 L132 104 L172 104"
        fill="none" stroke="url(#g)" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
